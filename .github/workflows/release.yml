name: Publish template assets

# Builds the free template zips (aria/grid/pulse) and (re)uploads them to the
# moving `templates-latest` release, which the Manager catalog installs 1-click.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Build + zip free templates
        run: node scripts/package-templates.mjs

      - name: Upload to the templates-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view templates-latest >/dev/null 2>&1 || \
            gh release create templates-latest \
              --title "Template downloads" \
              --notes "Free template zips for the Glasshopper Manager catalog. Auto-updated by CI." \
              --prerelease
          gh release upload templates-latest templates_dist/*.zip --clobber
