name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  hassfest:
    name: HA integration validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    # HACS reads the repo's files through the public GitHub API, which fails
    # while this repo is PRIVATE (hacsjson / integration_manifest come back
    # empty). It validates for real once the repo is public (the open-core
    # launch step), so keep it non-blocking until then.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # 'brands' requires the integration to be listed in the
          # home-assistant/brands repo (a separate PR, done at HACS submission).
          ignore: brands
