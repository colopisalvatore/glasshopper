name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  hassfest:
    name: HA integration validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    # Repo is public (since 2026-06-28), so HACS validates for real and this
    # job is now blocking. 'brands' stays ignored until the home-assistant/brands
    # PR is merged (separate step, needed for HACS *default* repo submission;
    # custom-repo install works without it).
    steps:
      - uses: actions/checkout@v5
      - uses: hacs/action@main
        with:
          category: integration
          ignore: brands
