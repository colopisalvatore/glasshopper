name: Bug report
description: Report a problem with ha-react-ui
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the issue and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
    validations:
      required: true
  - type: input
    id: pkg-version
    attributes:
      label: ha-react-ui version (or commit SHA)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
